<script>
(function() {
    // 1. Создаем стили
    const style = document.createElement('style');
    style.innerHTML = `
        .universal-legal-footer {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(13, 17, 23, 0.9); color: #8b949e; 
            text-align: center; padding: 8px 0; font-family: sans-serif; 
            font-size: 11px; z-index: 999999; backdrop-filter: blur(5px);
            border-top: 1px solid #30363d;
        }
        .universal-legal-footer a { color: #58a6ff; text-decoration: none; margin: 0 10px; cursor: pointer; }
        
        #legal-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000000; overflow-y: auto; padding: 20px;
            box-sizing: border-box; color: #c9d1d9; font-family: sans-serif; line-height: 1.5;
        }
        .modal-content {
            background: #161b22; max-width: 600px; margin: 40px auto; 
            padding: 30px; border-radius: 8px; border: 1px solid #30363d; position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #58a6ff; }
        h1 { color: #58a6ff; font-size: 20px; border-bottom: 1px solid #30363d; padding-bottom: 8px; margin-top: 0; }
        h2 { color: #58a6ff; font-size: 16px; margin: 20px 0 10px 0; }
        ul { padding-left: 20px; margin-bottom: 25px; }
        li { margin-bottom: 12px; }
        
        /* Кнопки принятия условий */
        .modal-buttons { text-align: right; margin-top: 20px; border-top: 1px solid #30363d; padding-top: 15px; }
        .btn-legal { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; margin-left: 10px; font-weight: bold; }
        .btn-accept { background: #238636; color: #ffffff; }
        .btn-accept:hover { background: #2ea043; }
        .btn-decline { background: #21262d; color: #f0f6fc; border: 1px solid #30363d; }
        .btn-decline:hover { background: #30363d; }

        /* Контейнер для кружка палитры */
        .inline-color-picker-wrapper {
            display: inline-flex;
            align-items: center;
            vertical-align: middle;
            margin-left: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
        }
        .inline-color-picker-wrapper:hover {
            transform: scale(1.1);
        }

        /* Инпут выбора цвета */
        .round-picker {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            display: block;
        }
        .round-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .round-picker::-webkit-color-swatch {
            border: 1px solid #fff;
            border-radius: 50%;
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
        }
        .round-picker::-moz-color-swatch {
            border: 1px solid #fff;
            border-radius: 50%;
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
        }
    `;
    document.head.appendChild(style);

    // 2. Создаем футер страницы
    const footer = document.createElement('footer');
    footer.className = 'universal-legal-footer';
    footer.innerHTML = `
        &copy; 2026 Maksym Didukh | 
        <a href="https://wwwwebs.netlify.app/">Dashboard</a> | 
        <a id="open-legal">Impressum & Datenschutz</a>
    `;
    document.body.appendChild(footer);

    // 3. Создаем новое модальное окно (Кружок встроен в заголовок рядом с Datenschutz)
    const modal = document.createElement('div');
    modal.id = 'legal-modal';
    modal.innerHTML = `
        <div class="modal-content">
            <span class="close-modal" id="close-legal">&times;</span>
            <h1>Rechtliche Bestätigung</h1>
            <p>Sie nutzen gerade das Projekt: <strong>Sterm</strong></p>
            
            <h2>
                Impressum | Datenschutz
                <span class="inline-color-picker-wrapper">
                    <input type="color" id="bgPicker" class="round-picker" title="Выбрать цвет фона">
                </span>
            </h2>
            
            <ul>
                <li><strong>Inhalte:</strong> Nutzer können Inhalte (Texte, Zeichnungen, Nachrichten) erstellen. Diese können im Rahmen der Funktionalität gespeichert werden.</li>
                <li><strong>Externe Inhalte:</strong> Einige Projekte können externe Webseiten oder Dienste einbinden. Für deren Inhalte sind die jeweiligen Betreiber verantwortlich.</li>
                <li><strong>Verhaltensregeln:</strong> Die Nutzung für rechtswidrige, beleidigende oder schädliche Inhalte ist untersagt.</li>
                <li><strong>Datenverarbeitung:</strong> Es können technische Daten (z. B. IP-Adresse, Browser, Zeitstempel) sowie LocalStorage-Daten zur Funktion gespeichert werden.</li>
            </ul>
            
            <p>Stimmen Sie den Bedingungen für Sterm zu?</p>
            
            <div class="modal-buttons">
                <button class="btn-legal btn-decline" id="decline-legal">Ablehnen</button>
                <button class="btn-legal btn-accept" id="accept-legal">Akzeptieren</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);

    // 4. Логика смены фона сайта и сохранения в LocalStorage
    const picker = document.getElementById('bgPicker');
    const savedColor = localStorage.getItem('siteBackgroundColor');
    
    if (savedColor) {
        document.body.style.backgroundColor = savedColor;
        picker.value = savedColor;
    }

    picker.addEventListener('input', (event) => {
        document.body.style.backgroundColor = event.target.value;
    });

    picker.addEventListener('change', (event) => {
        localStorage.setItem('siteBackgroundColor', event.target.value);
    });

    // 5. Логика кнопок и открытия/закрытия модального окна
    document.getElementById('open-legal').onclick = () => modal.style.display = 'block';
    document.getElementById('close-legal').onclick = () => modal.style.display = 'none';
    
    // Действия при нажатии на кнопки внутри модалки
    document.getElementById('accept-legal').onclick = () => {
        console.log('Пользователь принял условия Sterm');
        modal.style.display = 'none';
    };
    document.getElementById('decline-legal').onclick = () => {
        console.log('Пользователь отклонил условия Sterm');
        modal.style.display = 'none';
    };

    window.onclick = (event) => { if (event.target == modal) modal.style.display = 'none'; };
})();
        </script>
